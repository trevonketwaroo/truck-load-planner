<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product sizes — Truck Load Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 3h13v10H1z" />
          <path d="M14 7h4l3 3v3h-7z" />
          <circle cx="6" cy="17" r="1.8" />
          <circle cx="17.5" cy="17" r="1.8" />
        </svg>
      </span>
      Truck Load Planner
    </a>
    <span class="spacer"></span>
    <a class="nav-link" href="/">← Back to load planner</a>
  </header>

  <main class="page page-wide">
    <h1 class="page-title">Product sizes</h1>
    <p class="count" id="summary">Loading…</p>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.5" y2="16.5" />
        </svg>
        <input id="search" placeholder="Search products…" />
      </div>
      <label class="chk"><input type="checkbox" id="only-missing" /> Only missing sizes</label>
    </div>

    <div class="table-card">
      <div class="table-scroll">
        <table class="products">
          <thead>
            <tr>
              <th>Product</th><th>Category</th>
              <th>L (cm)</th><th>W (cm)</th><th>H (cm)</th><th>Weight (kg)</th>
              <th>Stack?</th><th>Top-only</th><th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="products.js"></script>
</body>
</html>
