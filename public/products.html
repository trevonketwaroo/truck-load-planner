<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product sizes — Truck Load Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 3h13v10H1z" />
          <path d="M14 7h4l3 3v3h-7z" />
          <circle cx="6" cy="17" r="1.8" />
          <circle cx="17.5" cy="17" r="1.8" />
        </svg>
      </span>
      Truck Load Planner
    </a>
    <span class="spacer"></span>
    <a class="nav-link" href="/">← Back to load planner</a>
  </header>

  <main class="page page-wide">
    <h1 class="page-title">Product sizes</h1>
    <p class="count" id="summary">Loading…</p>

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">—</span>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.5" y2="16.5" />
        </svg>
        <input id="search" placeholder="Search products…" />
      </div>
      <label class="chk"><input type="checkbox" id="only-missing" /> Only missing sizes</label>
      <button id="measure-start" class="btn-primary measure-start" type="button">📏 Measure mode</button>
    </div>

    <!-- Phone-friendly measuring flow: one product at a time, big inputs,
         tab/Enter runs L → W → H → weight → Save → next. -->
    <section id="measure-mode" class="measure-card" style="display:none">
      <div class="measure-head">
        <span class="measure-count" id="measure-count">—</span>
        <button id="measure-exit" class="btn-ghost" type="button">✕ Done</button>
      </div>
      <div id="measure-body">
        <div class="measure-name" id="measure-name">—</div>
        <div class="measure-cat" id="measure-cat"></div>
        <div class="measure-fields">
          <label>Length <span>cm</span><input id="m-l" type="number" min="0" step="0.5" inputmode="decimal" /></label>
          <label>Width <span>cm</span><input id="m-w" type="number" min="0" step="0.5" inputmode="decimal" /></label>
          <label>Height <span>cm</span><input id="m-h" type="number" min="0" step="0.5" inputmode="decimal" /></label>
          <label>Weight <span>kg</span><input id="m-kg" type="number" min="0" step="0.1" inputmode="decimal" /></label>
        </div>
        <div class="measure-actions">
          <button id="measure-skip" class="btn-ghost" type="button">Skip →</button>
          <button id="measure-save" class="btn-primary" type="button">Save &amp; next →</button>
        </div>
        <p class="measure-hint">Tip: type a number, press <kbd>Tab</kbd> to jump to the next box. <kbd>Enter</kbd> saves and loads the next product.</p>
      </div>
      <div id="measure-done" class="measure-done" style="display:none">
        <div class="measure-done-emoji">🎉</div>
        <div class="measure-done-title">All products measured</div>
        <p class="measure-done-sub">Every product has sizes. Nice work.</p>
        <button id="measure-done-exit" class="btn-primary" type="button">Back to list</button>
      </div>
    </section>

    <div class="table-card">
      <div class="table-scroll">
        <table class="products">
          <thead>
            <tr>
              <th>Product</th><th>Category</th>
              <th>L (cm)</th><th>W (cm)</th><th>H (cm)</th><th>Weight (kg)</th>
              <th>Stack?</th><th>Top-only</th><th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="products.js"></script>
</body>
</html>
