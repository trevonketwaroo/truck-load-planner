<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product sizes — Truck Load Planner</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; max-width: 1000px; }
    h1 { margin-bottom: 4px; }
    nav { margin: -2px 0 12px; }
    .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    input, select, button { font: inherit; padding: 6px 8px; }
    button { cursor: pointer; border-radius: 8px; border: 1px solid #888; background: #fff; }
    #search { flex: 1; min-width: 180px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    th { position: sticky; top: 0; background: #fafafa; }
    td input[type=number] { width: 64px; }
    td input[type=text] { width: 140px; }
    .dim-missing { background: #fff6f0; }
    .save-cell button { padding: 5px 10px; }
    .saved { color: #1d9e75; font-size: 13px; }
    .count { color: #666; font-size: 13px; }
    .chk { display: inline-flex; gap: 4px; align-items: center; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Product sizes</h1>
  <nav><a href="/" style="font-size:14px;">← Back to load planner</a></nav>
  <p class="count" id="summary">Loading…</p>

  <div class="bar">
    <input id="search" placeholder="Search products…" />
    <label class="chk"><input type="checkbox" id="only-missing" /> only missing sizes</label>
  </div>

  <table>
    <thead>
      <tr>
        <th>Product</th><th>Category</th>
        <th>L (cm)</th><th>W (cm)</th><th>H (cm)</th><th>Weight (kg)</th>
        <th>Stack?</th><th>Top-only</th><th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script src="products.js"></script>
</body>
</html>
